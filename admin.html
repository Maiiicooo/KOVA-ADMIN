<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KOVA Admin Add Pending Spot</title>

    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.umd.min.js"></script>
    <link
      href="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.css"
      rel="stylesheet"
    />

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: #0b0b0b;
        color: white;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        padding: 16px;
      }

      .wrap {
        width: min(560px, 100%);
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 18px;
        color: rgba(255, 255, 255, 0.65);
      }

      .card {
        background: #141414;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        padding: 16px;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.9rem;
      }

      input,
      textarea {
        width: 100%;
        padding: 13px;
        border-radius: 13px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: #0c0c0c;
        color: white;
        font: inherit;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      button {
        width: 100%;
        margin-top: 12px;
        padding: 14px;
        border: 0;
        border-radius: 13px;
        background: #8b7108;
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.86);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .mini-map {
        width: 100%;
        height: 240px;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: #080808;
      }

      .map-marker {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: #8b7108;
        border: 3px solid white;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.6);
      }

      .maplibregl-control-container,
      .maplibregl-ctrl-bottom-left,
      .maplibregl-ctrl-logo,
      .maplibregl-ctrl-attrib,
      .maptiler-attribution {
        display: none !important;
      }

      .photo-preview {
        width: 100%;
        max-height: 260px;
        object-fit: cover;
        border-radius: 14px;
        margin-top: 10px;
        display: none;
        border: 1px solid rgba(255, 255, 255, 0.14);
      }

      .status {
        margin-top: 14px;
        padding: 12px;
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.75);
        display: none;
        line-height: 1.4;
      }

      .status.show {
        display: block;
      }

      .status.good {
        color: #a8ee9d;
      }

      .status.bad {
        color: #ff9f9f;
      }

      .small {
        margin-top: 7px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.82rem;
        line-height: 1.4;
      }

      @media (max-width: 480px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .mini-map {
          height: 220px;
        }
      }
    </style>
  </head>

  <body>
    <main class="wrap">
      <h1>KOVA ADMIN</h1>
      <p>Fast spot hunting tool.</p>

      <form id="spotForm" class="card">
        <button type="button" id="gpsBtn">Use current GPS location</button>

        <div class="grid">
          <div>
            <label for="lat">Latitude</label>
            <input id="lat" required />
          </div>

          <div>
            <label for="lng">Longitude</label>
            <input id="lng" required />
          </div>
        </div>

        <label>GPS check map</label>
        <div id="miniMap" class="mini-map"></div>
        <div class="small">
          Tik op de map als je de marker iets wilt corrigeren.
        </div>

        <label for="photoFile">Spot photo</label>
        <input id="photoFile" type="file" accept="image/*" required />
        <div class="small">
        </div>
        <img id="photoPreview" class="photo-preview" alt="Spot preview" />

        <label for="name">Spot name</label>
        <input id="name" placeholder="bv. Hidden sunset bench" required />

        <label for="description">Description</label>
        <textarea
          id="description"
          placeholder="Korte vibe/info..."
          required
        ></textarea>

        <label for="addedBy">Added by</label>
        <input id="addedBy" value="Maico" />

        <button type="submit" id="saveBtn">Save to pending spots</button>

        <button type="button" id="syncBtn">Sync locally saved spots</button>
        <button type="button" id="clearQueueBtn" class="secondary">Clear local saved spots</button>
        <div id="queueStatus" class="small">Locally saved spots: 0</div>

        <div id="status" class="status"></div>
      </form>
    </main>

    <script>
      const MAPTILER_KEY = "7TBqy4hTdFfQeIq7oXKj";

      maptilersdk.config.apiKey = MAPTILER_KEY;

      const firebaseConfig = {
        apiKey: "AIzaSyARxFI9HyJxrINfzDazhxFHKSrGLX8KoBk",
        authDomain: "kova-6052a.firebaseapp.com",
        projectId: "kova-6052a",
        storageBucket: "kova-6052a.firebasestorage.app",
        messagingSenderId: "873689812978",
        appId: "1:873689812978:web:e0581f3df823e51239656b",
        measurementId: "G-VM5224Z3K6",
      };

      firebase.initializeApp(firebaseConfig);

      const db = firebase.firestore();
      const storage = firebase.storage();

      const form = document.getElementById("spotForm");
      const gpsBtn = document.getElementById("gpsBtn");
      const saveBtn = document.getElementById("saveBtn");
      const syncBtn = document.getElementById("syncBtn");
      const clearQueueBtn = document.getElementById("clearQueueBtn");
      const queueStatusEl = document.getElementById("queueStatus");
      const statusEl = document.getElementById("status");

      const latInput = document.getElementById("lat");
      const lngInput = document.getElementById("lng");
      const photoFileInput = document.getElementById("photoFile");
      const photoPreview = document.getElementById("photoPreview");
      const nameInput = document.getElementById("name");
      const descriptionInput = document.getElementById("description");
      const addedByInput = document.getElementById("addedBy");

      let miniMap = null;
      let spotMarker = null;
      let syncInProgress = false;

      function status(message, type = "") {
        statusEl.textContent = message;
        statusEl.className = "status show";

        if (type === "good") statusEl.classList.add("good");
        if (type === "bad") statusEl.classList.add("bad");
      }

      function getErrorText(err) {
        if (!err) return "Unknown error";
        return err.code ? `${err.code}: ${err.message || ""}` : err.message || String(err);
      }

      function makeSafeFileName(name) {
        return String(name || "spot.jpg")
          .toLowerCase()
          .replace(/[^a-z0-9._-]/g, "-")
          .slice(0, 80);
      }

      const LOCAL_DB_NAME = "kova-offline-spots";
      const LOCAL_DB_VERSION = 1;
      const LOCAL_STORE_NAME = "pendingSpotQueue";
      // No hard upload timeout: a timeout can finish in the background and create duplicate retry problems.

      function openLocalDb() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(LOCAL_DB_NAME, LOCAL_DB_VERSION);

          request.onupgradeneeded = () => {
            const localDb = request.result;

            if (!localDb.objectStoreNames.contains(LOCAL_STORE_NAME)) {
              localDb.createObjectStore(LOCAL_STORE_NAME, { keyPath: "id" });
            }
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function withLocalStore(mode, callback) {
        const localDb = await openLocalDb();

        return new Promise((resolve, reject) => {
          const tx = localDb.transaction(LOCAL_STORE_NAME, mode);
          const store = tx.objectStore(LOCAL_STORE_NAME);
          const result = callback(store);

          tx.oncomplete = () => {
            localDb.close();
            resolve(result);
          };

          tx.onerror = () => {
            localDb.close();
            reject(tx.error);
          };
        });
      }

      function requestToPromise(request) {
        return new Promise((resolve, reject) => {
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function getQueuedSpots() {
        const localDb = await openLocalDb();

        return new Promise((resolve, reject) => {
          const tx = localDb.transaction(LOCAL_STORE_NAME, "readonly");
          const store = tx.objectStore(LOCAL_STORE_NAME);
          const request = store.getAll();

          request.onsuccess = () => resolve(request.result || []);
          request.onerror = () => reject(request.error);

          tx.oncomplete = () => localDb.close();
          tx.onerror = () => {
            localDb.close();
            reject(tx.error);
          };
        });
      }

      async function saveSpotLocally(spot) {
        await withLocalStore("readwrite", (store) => store.put(spot));
        await updateQueueStatus();
      }

      async function deleteLocalSpot(id) {
        await withLocalStore("readwrite", (store) => store.delete(id));
        await updateQueueStatus();
      }

      async function clearLocalQueue() {
        await withLocalStore("readwrite", (store) => store.clear());
        await updateQueueStatus();
      }

      async function updateQueueStatus() {
        try {
          const queued = await getQueuedSpots();
          const count = queued.length;
          queueStatusEl.textContent = `Locally saved spots: ${count}${navigator.onLine ? "" : " · offline"}`;
          syncBtn.disabled = count === 0 || syncInProgress;
          clearQueueBtn.disabled = count === 0 || syncInProgress;
        } catch (err) {
          console.error(err);
          queueStatusEl.textContent = "Could not read local queue.";
        }
      }

      function withTimeout(promise, ms, message = "Upload took too long") {
        let timer;

        const timeout = new Promise((_, reject) => {
          timer = setTimeout(() => reject(new Error(message)), ms);
        });

        return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
      }

      function encodeGeohash(latitude, longitude, precision = 9) {
        const base32 = "0123456789bcdefghjkmnpqrstuvwxyz";

        let idx = 0;
        let bit = 0;
        let evenBit = true;
        let geohash = "";

        let latMin = -90;
        let latMax = 90;
        let lonMin = -180;
        let lonMax = 180;

        while (geohash.length < precision) {
          if (evenBit) {
            const lonMid = (lonMin + lonMax) / 2;

            if (longitude >= lonMid) {
              idx = idx * 2 + 1;
              lonMin = lonMid;
            } else {
              idx = idx * 2;
              lonMax = lonMid;
            }
          } else {
            const latMid = (latMin + latMax) / 2;

            if (latitude >= latMid) {
              idx = idx * 2 + 1;
              latMin = latMid;
            } else {
              idx = idx * 2;
              latMax = latMid;
            }
          }

          evenBit = !evenBit;

          if (++bit === 5) {
            geohash += base32.charAt(idx);
            bit = 0;
            idx = 0;
          }
        }

        return geohash;
      }

      function initMiniMap() {
        miniMap = new maptilersdk.Map({
          container: "miniMap",
          style: `https://api.maptiler.com/maps/dataviz-dark/style.json?key=${MAPTILER_KEY}`,
          center: [4.5, 50.85],
          zoom: 7,
          navigationControl: false,
          geolocateControl: false,
          projectionControl: false,
        });

        miniMap.on("click", (e) => {
          const lat = e.lngLat.lat;
          const lng = e.lngLat.lng;

          setCoordsAndMarker(lat, lng, {
            zoom: Math.max(miniMap.getZoom(), 16),
            message: "Marker manually corrected on map.",
          });
        });
      }

      function setCoordsAndMarker(lat, lng, options = {}) {
        const zoom = options.zoom || 16;
        const message = options.message || "";

        latInput.value = Number(lat).toFixed(6);
        lngInput.value = Number(lng).toFixed(6);

        if (!spotMarker) {
          const markerEl = document.createElement("div");
          markerEl.className = "map-marker";

          spotMarker = new maptilersdk.Marker({
            element: markerEl,
            anchor: "center",
            draggable: true,
          })
            .setLngLat([lng, lat])
            .addTo(miniMap);

          spotMarker.on("dragend", () => {
            const pos = spotMarker.getLngLat();
            latInput.value = pos.lat.toFixed(6);
            lngInput.value = pos.lng.toFixed(6);
            status("Marker dragged. Coords updated.", "good");
          });
        } else {
          spotMarker.setLngLat([lng, lat]);
        }

        miniMap.easeTo({
          center: [lng, lat],
          zoom,
          duration: 450,
        });

        if (message) {
          status(message, "good");
        }
      }

      function updateMarkerFromInputs() {
        const lat = Number(latInput.value.replace(",", "."));
        const lng = Number(lngInput.value.replace(",", "."));

        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
        if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return;

        setCoordsAndMarker(lat, lng, {
          zoom: Math.max(miniMap.getZoom(), 15),
          message: "Coords changed. Map updated.",
        });
      }

      async function uploadPhoto(file, docId) {
        const fileName = makeSafeFileName(file.name);
        const path = `spot_photos/${docId}/${Date.now()}-${fileName}`;
        const ref = storage.ref().child(path);

        const snapshot = await ref.put(file, {
          contentType: file.type || "image/jpeg",
        });

        return await snapshot.ref.getDownloadURL();
      }

      async function pendingSpotAlreadyExists(docRef) {
        try {
          const snapshot = await docRef.get();
          return snapshot.exists;
        } catch (err) {
          // If rules do not allow reading pending_spots, we simply continue with upload.
          console.warn("Could not check existing pending spot:", err);
          return false;
        }
      }

      function makePendingSpotPayload(spot, photoURL) {
        return {
          name: spot.name,
          description: spot.description,
          photoURL,
          addedBy: spot.addedBy,
          lat: spot.lat,
          lng: spot.lng,
          geohash: spot.geohash,

          status: "pending",

          ratingSum: 0,
          ratingCount: 0,
          avgRating: 0,

          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        };
      }

      async function uploadQueuedSpot(spot) {
        const docRef = db.collection("pending_spots").doc(spot.id);

        // Important: if a previous slow upload eventually succeeded, the local queue may still contain it.
        // In that case, do not set the document again because Firestore rules may allow create but block update.
        if (await pendingSpotAlreadyExists(docRef)) {
          return "already-in-pending";
        }

        const photoURL = await uploadPhoto(spot.file, spot.id);

        try {
          await docRef.set(makePendingSpotPayload(spot, photoURL));
          return "uploaded";
        } catch (err) {
          // If the document appeared after the upload started, treat it as synced and remove it locally.
          if (err && err.code === "permission-denied" && (await pendingSpotAlreadyExists(docRef))) {
            return "already-in-pending";
          }

          throw err;
        }
      }

      async function syncQueuedSpots() {
        if (syncInProgress) return;

        if (!navigator.onLine) {
          status("No internet. Spots stay locally saved.", "bad");
          await updateQueueStatus();
          return;
        }

        const queued = await getQueuedSpots();

        if (!queued.length) {
          await updateQueueStatus();
          return;
        }

        syncInProgress = true;
        await updateQueueStatus();
        status(`Syncing ${queued.length} locally saved spot(s)...`);

        let uploaded = 0;
        let alreadyInPending = 0;
        let failed = 0;
        let lastError = "";

        for (const spot of queued) {
          try {
            const result = await uploadQueuedSpot(spot);
            await deleteLocalSpot(spot.id);

            if (result === "already-in-pending") {
              alreadyInPending += 1;
            } else {
              uploaded += 1;
            }
          } catch (err) {
            console.error(err);
            failed += 1;
            lastError = getErrorText(err);
          }
        }

        syncInProgress = false;
        await updateQueueStatus();

        const synced = uploaded + alreadyInPending;

        if (failed === 0) {
          status(`Synced ${synced} spot(s). Uploaded: ${uploaded}. Already in pending: ${alreadyInPending}.`, "good");
        } else {
          status(`Synced ${synced}. ${failed} still locally saved. Error: ${lastError}`, "bad");
        }
      }

      function resetFormAfterSave() {
        nameInput.value = "";
        descriptionInput.value = "";
        photoFileInput.value = "";
        photoPreview.style.display = "none";
        photoPreview.removeAttribute("src");
      }

      gpsBtn.addEventListener("click", () => {
        if (!navigator.geolocation) {
          status("GPS not supported on this device.", "bad");
          return;
        }

        gpsBtn.disabled = true;
        status("Getting location...");

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const accuracy = Math.round(pos.coords.accuracy || 0);

            setCoordsAndMarker(lat, lng, {
              zoom: 17,
              message: `GPS locked. Accuracy: ±${accuracy}m.`,
            });

            gpsBtn.disabled = false;
          },
          (err) => {
            status(err.message || "Could not get location.", "bad");
            gpsBtn.disabled = false;
          },
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0,
          },
        );
      });

      latInput.addEventListener("change", updateMarkerFromInputs);
      lngInput.addEventListener("change", updateMarkerFromInputs);

      photoFileInput.addEventListener("change", () => {
        const file = photoFileInput.files && photoFileInput.files[0];

        if (!file) {
          photoPreview.style.display = "none";
          photoPreview.removeAttribute("src");
          return;
        }

        const previewURL = URL.createObjectURL(file);
        photoPreview.src = previewURL;
        photoPreview.style.display = "block";
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const lat = Number(latInput.value.replace(",", "."));
        const lng = Number(lngInput.value.replace(",", "."));
        const file = photoFileInput.files && photoFileInput.files[0];

        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          status("Invalid coordinates.", "bad");
          return;
        }

        if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
          status("Coordinates out of range.", "bad");
          return;
        }

        if (!file) {
          status("Choose or take a photo first.", "bad");
          return;
        }

        const name = nameInput.value.trim();
        const description = descriptionInput.value.trim();
        const addedBy = addedByInput.value.trim() || "Maico";

        if (!name || !description) {
          status("Name and description are required.", "bad");
          return;
        }

        saveBtn.disabled = true;
        status("Preparing pending spot...");

        const localSpot = {
          id: db.collection("pending_spots").doc().id,
          name,
          description,
          addedBy,
          lat,
          lng,
          geohash: encodeGeohash(lat, lng, 9),
          file,
          fileName: file.name || "spot.jpg",
          fileType: file.type || "image/jpeg",
          createdOffline: true,
          localCreatedAt: new Date().toISOString(),
        };

        // First save locally. This prevents losing the spot if internet dies during upload.
        await saveSpotLocally(localSpot);
        resetFormAfterSave();
        saveBtn.disabled = false;

        if (navigator.onLine) {
          status("Spot locally saved. Sync started.", "good");
          syncQueuedSpots();
        } else {
          status("Spot locally saved. It will sync when internet is back.", "good");
        }

        await updateQueueStatus();
      });

      syncBtn.addEventListener("click", syncQueuedSpots);

      clearQueueBtn.addEventListener("click", async () => {
        const queued = await getQueuedSpots();

        if (!queued.length) return;

        const confirmed = window.confirm(
          "Clear local saved spots? Only do this if the spots are already visible in pending_spots.",
        );

        if (!confirmed) return;

        await clearLocalQueue();
        status("Local saved spots cleared.", "good");
      });

      window.addEventListener("online", syncQueuedSpots);
      window.addEventListener("offline", updateQueueStatus);

      initMiniMap();
      updateQueueStatus();
      setTimeout(syncQueuedSpots, 1500);
      setInterval(syncQueuedSpots, 30000);
    </script>
  </body>
</html>
